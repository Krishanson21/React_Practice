  function Navbar() {
  return (
    <nav className="navbar navbar-expand-lg navbar-dark bg-dark">
      <div className="container-fluid">
        <a className="navbar-brand" href="#">MyWebsite</a>

        <button
          className="navbar-toggler"

          data-bs-target="#navbarNav"

        </button>

}
  function Footer(){
    return <h2>this is the footer so ya that's it.</h2>
  }

  function HomePage(){
    const names = ['Ada Lovelace', 'Grace Hopper', 'Margaret Hamilton'];

    const [likes, setLikes] = React.useState(0);
    function handleClick(){
      
      setLikes(likes + 1);
    }
    return (<div><Header title="This is Krishan Tiwari"/>
        <Header title="I Am a Web Developer"/>
        <Header/>
        <Navbar />
        <div><img src="in.jpg" alt="not loaded" /></div>
         <div>
            <ul>
              {names.map((name)=>(
              <li key={name}>{name}</li>
              ))}
            </ul>
        </div>
        <div className="artical"><p>this is suppose to be an artical</p></div>
        <div><Footer/></div>
        <button onClick={handleClick}> Likes ({likes}) </button>
        </div>)
      }

  function Header(props){
        return (
         <div>
            <div><h1>{props.title ? props.title : "Default title"}</h1></div>;
            </div>)
        }
        const root = ReactDOM.createRoot(app);
        root.render(<HomePage />);
